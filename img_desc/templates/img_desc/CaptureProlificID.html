{% extends "otree/Page.html" %}
{% load otree static %}

{% block title %}{% endblock %}

{% block content %}
<input type="hidden" name="prolific_id_field" id="prolific_id_field" value="">
<input type="hidden" name="study_id_field" id="study_id_field" value="">
<input type="hidden" name="session_id_field" id="session_id_field" value="">
<input type="hidden" id="server_prolific_pid" value="{{ prolific_pid }}">
<input type="hidden" id="server_study_id" value="{{ study_id }}">
<input type="hidden" id="server_session_id" value="{{ session_id }}">

<p style="display:none;">Starting experiment...</p>

<script>
document.addEventListener('DOMContentLoaded', function () {
    // Read Prolific params from the actual browser URL, not from server-side reconstruction.
    const params = new URLSearchParams(window.location.search);
    const serverPid = document.getElementById('server_prolific_pid').value || '';
    const serverStudyId = document.getElementById('server_study_id').value || '';
    const serverSessionId = document.getElementById('server_session_id').value || '';

    document.getElementById('prolific_id_field').value =
        params.get('PROLIFIC_PID') ||
        params.get('prolific_pid') ||
        params.get('prolific_id') ||
        params.get('participant_label') ||
        serverPid ||
        '';

    document.getElementById('study_id_field').value =
        params.get('STUDY_ID') || params.get('study_id') || serverStudyId || '';

    document.getElementById('session_id_field').value =
        params.get('SESSION_ID') || params.get('session_id') || serverSessionId || '';

    // Submit immediately so the participant does not see an extra step.
    const form = document.querySelector('form');
    if (form) {
        form.submit();
    }
});
</script>
{% endblock %}
